
services:
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - log-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - log-network
    depends_on:
      - loki

  user-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./user-service:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    networks:
      - log-network
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"

  order-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./order-service:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"
    networks:
      - log-network
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"

networks:
  log-network:
    driver: bridge
