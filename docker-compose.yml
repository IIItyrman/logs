version: "3.8"

services:
  # =============================================
  # Loki — хранилище логов
  # =============================================
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - logging-net

  # =============================================
  # Grafana — дашборды и визуализация
  # =============================================
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./grafana/dashboards/microservices.json:/etc/grafana/provisioning/dashboards/microservices.json
    networks:
      - logging-net
    depends_on:
      - loki

  # =============================================
  # user-service — сервис пользователей
  # =============================================
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=user-service
      - ORDER_SERVICE_URL=http://order-service:8002
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"
        loki-external-labels: service=user-service,env=dev
        loki-retries: "5"
        loki-max-backoff: "2s"
    networks:
      - logging-net
    depends_on:
      - loki

  # =============================================
  # order-service — сервис заказов
  # =============================================
  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=order-service
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"
        loki-external-labels: service=order-service,env=dev
        loki-retries: "5"
        loki-max-backoff: "2s"
    networks:
      - logging-net
    depends_on:
      - loki

networks:
  logging-net:
    driver: bridge